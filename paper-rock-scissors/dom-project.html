<!DOCTYPE html>
<html>
  <head>
    <title>DOM project</title>
  </head>
  <body>
    <p>Youtube Subscribe Button</p>
    <button onclick = "
    subscribe()
    " class = 'subscribe-button'>
      Subscribe
    </button>

    <script>
      function subscribe() {
         const subutton = document.querySelector('.subscribe-button');
          if(subutton.innerText === 'Subscribe') {
            subutton.innerHTML = 'Subscribed';
          }
          else {
            subutton.innerHTML = 'Subscribe';
          }
      }
      
    </script>
  </body>
</html>
